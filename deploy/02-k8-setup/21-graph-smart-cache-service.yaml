apiVersion: v1
kind: Service
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
    service.beta.kubernetes.io/aws-load-balancer-name: "${ENVIRONMENT}-graph-smart-cache-nlb"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  labels:
    io.kompose.service: ${ENVIRONMENT}-graph-smart-cache
  name: ${ENVIRONMENT}-graph-smart-cache
spec:
  type: LoadBalancer
  ports:
    - name: "3030"
      port: 3030
      targetPort: 3030
  selector:
    io.kompose.service: ${ENVIRONMENT}-graph-smart-cache
