apiVersion: v1
kind: Service
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml --verbose
    kompose.version: 1.34.0 (HEAD)
    service.beta.kubernetes.io/aws-load-balancer-name: "${ENVIRONMENT}-paralog-frontend-nlb"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  labels:
    io.kompose.service: ${ENVIRONMENT}-frontend
  name: ${ENVIRONMENT}-frontend
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 80
  type: LoadBalancer
  selector:
    io.kompose.service: ${ENVIRONMENT}-frontend
