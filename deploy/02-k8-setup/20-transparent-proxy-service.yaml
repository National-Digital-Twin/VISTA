apiVersion: v1
kind: Service
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
    service.beta.kubernetes.io/aws-load-balancer-name: "${ENVIRONMENT}-transparent-proxy"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  labels:
    io.kompose.service: ${ENVIRONMENT}-transparent-proxy
  name: ${ENVIRONMENT}-transparent-proxy
spec:
  type: LoadBalancer
  ports:
    - name: "5013"
      port: 5013
      targetPort: 80
  selector:
    io.kompose.service: ${ENVIRONMENT}-transparent-proxy
