apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml --verbose
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: ${ENVIRONMENT}-frontend
  name: ${ENVIRONMENT}-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ${ENVIRONMENT}-frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml --verbose
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: ${ENVIRONMENT}-frontend
    spec:
      containers:
        - image: 122610484203.dkr.ecr.eu-west-2.amazonaws.com/${repository_name}:${image_tag}
          env:
            - name: IMAGE_DIGEST
              value: ${IMAGE_DIGEST}
          name: frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
