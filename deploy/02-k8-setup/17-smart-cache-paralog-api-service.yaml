apiVersion: v1
kind: Service
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
    service.beta.kubernetes.io/aws-load-balancer-name: "${ENVIRONMENT}-smart-cache-paralog-api-nlb"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  labels:
    io.kompose.service: ${ENVIRONMENT}-smart-cache-paralog-api
  name: ${ENVIRONMENT}-smart-cache-paralog-api
spec:
  type: LoadBalancer
  ports:
    - name: "4001"
      port: 4001
      targetPort: 4001
  selector:
    io.kompose.service: ${ENVIRONMENT}-smart-cache-paralog-api
