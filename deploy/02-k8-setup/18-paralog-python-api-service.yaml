apiVersion: v1
kind: Service
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
    service.beta.kubernetes.io/aws-load-balancer-name: "${ENVIRONMENT}-paralog-python-api-nlb"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  labels:
    io.kompose.service: ${ENVIRONMENT}-paralog-python-api
  name: ${ENVIRONMENT}-paralog-python-api
spec:
  type: LoadBalancer
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: ${ENVIRONMENT}-paralog-python-api
