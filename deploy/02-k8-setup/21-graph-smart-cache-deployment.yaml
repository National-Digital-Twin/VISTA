apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: ${ENVIRONMENT}-graph-smart-cache
  name: ${ENVIRONMENT}-graph-smart-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ${ENVIRONMENT}-graph-smart-cache
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: ${ENVIRONMENT}-graph-smart-cache
    spec:
      containers:
        - args:
            - --ping
            - --config
            - /fuseki/config/config.ttl
          env:
            - name: IMAGE_DIGEST
              value: ${IMAGE_DIGEST}
            - name: JAVA_OPTIONS
              value: -XX:MaxRAMPercentage=70.0
            - name: JWKS_URL
              value: disabled
          image: 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/smart-cached-graph:latest
          name: ${ENVIRONMENT}-graph-smart-cache
          ports:
            - containerPort: 3030
              protocol: TCP
      restartPolicy: Always
