apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: ${NAME}
  name: ${NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ${NAME}
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: ${NAME}
    spec:
      containers:
        - image: 503561419905.dkr.ecr.eu-west-2.amazonaws.com/${repository_name}:${image_tag}
          imagePullPolicy: Always
          env:
            - name: IMAGE_DIGEST
              value: ${IMAGE_DIGEST}
            - name: DJANGO_SECRET_KEY
              value: ${DJANGO_SECRET_KEY}
            - name: DB_HOSTNAME
              value: ${DB_HOSTNAME}
            - name: ENVIRONMENT
              value: ${ENVIRONMENT}
            - name: AWS_DEFAULT_REGION
              value: "eu-west-2"
            - name: AWS_ACCESS_KEY_ID
              value: ${AWS_ACCESS_KEY_ID}
            - name: AWS_SECRET_ACCESS_KEY
              value: ${AWS_SECRET_ACCESS_KEY}

          name: ${NAME}
          ports:
            - containerPort: ${CONTAINER_PORT}
              protocol: TCP
      restartPolicy: Always
