apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: ${ENVIRONMENT}-ontology-api
  name: ${ENVIRONMENT}-ontology-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ${ENVIRONMENT}-ontology-api
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: ${ENVIRONMENT}-ontology-api
    spec:
      containers:
        - env:
            - name: IMAGE_DIGEST
              value: ${IMAGE_DIGEST}
            - name: JENA_PORT
              value: "3030"
            - name: JENA_URL
              value: ${ENVIRONMENT}-graph-smart-cache
            - name: ONTOLOGY_SERVER_MODE
              value: file
            - name: ONTO_PORT
              value: "5007"
          image: 122610484203.dkr.ecr.eu-west-2.amazonaws.com/paralog/telicent-smart-cache-ontology:0.0.5-rc1
          livenessProbe:
            exec:
              command:
                - curl -X GET "http://localhost:5007/" || exit 1
            failureThreshold: 5
            periodSeconds: 30
            timeoutSeconds: 10
          name: ${ENVIRONMENT}-ontology-api
          ports:
            - containerPort: 5007
              protocol: TCP
      restartPolicy: Always
