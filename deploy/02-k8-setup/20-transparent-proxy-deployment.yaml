apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: paralog
  annotations:
    kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: ${ENVIRONMENT}-transparent-proxy
  name: ${ENVIRONMENT}-transparent-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ${ENVIRONMENT}-transparent-proxy
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker_build/docker-compose.yaml
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: ${ENVIRONMENT}-transparent-proxy
    spec:
      containers:
        - env:
            - name: IMAGE_DIGEST
              value: ${IMAGE_DIGEST}
            - name: ADMIRALTY_API_KEY
              value: ${ADMIRALTY_API_KEY}
            - name: REALTIME_TRAINS_API_KEY
              value: ${REALTIME_TRAINS_API_KEY}
          image: 503561419905.dkr.ecr.eu-west-2.amazonaws.com/${repository_name}:${image_tag}
          name: ${ENVIRONMENT}-transparent-proxy
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
