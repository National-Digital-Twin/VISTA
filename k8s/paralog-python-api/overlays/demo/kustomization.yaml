resources:
  - ../../base

namespace: paralog-pro
patches:
  - path: patches/gateway.yaml
    target:
      kind: Gateway
  - path: patches/allow-ingress.yaml
    target:
      kind: AuthorizationPolicy
  - path: patches/virtualService.yaml
    target:
      kind: VirtualService
      name: paralog-pro-python-api
  - path: patches/service-account.yaml
    target:
      kind: ServiceAccount
      name: paralog-pro-python-api-sa

labels:
  - pairs:
      env: demo

images:
  - name: paralog-pro-python-api-image
    newName: 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api
    newTag: '1739979400'


configMapGenerator:
  - name: paralog-pro-python-api-configs
    envs:
      - params.env