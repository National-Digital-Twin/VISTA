apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    io.kompose.service: paralog-pro-python-api
  name: paralog-pro-python-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: paralog-pro-python-api
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-cache-enable: "false"
        vault.hashicorp.com/role: "paralog-pro-python-api-role"
      labels:
        io.kompose.service: paralog-pro-python-api
    spec:
      serviceAccountName: paralog-pro-python-api-sa
      containers:
        - name: paralog-pro-python-api-image
          image: paralog-pro-python-api-image
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: paralog-pro-python-api-configs
#          envFrom:
#           - secretRef:
#              name: paralog-pro-python-api-static-secret

          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"      # Minimum CPU your container is guaranteed.
              memory: "2Gi"  # Minimum Memory your container is guaranteed.
            limits:
              cpu: "3"     # Maximum CPU your container can use.
              memory: "3Gi" # Maximum Memory your container can use.
      restartPolicy: Always
