
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService

metadata:
  name: paralog-python-api
spec:
  hosts:
    - placeholder
  gateways:
    - placeholder
  http:
    - match:
        - uri:
            prefix: /ndtp-python/
      rewrite:
          uri: "/"
      route:
        - destination:
            host: paralog-python-api
            port:
              number: 80
