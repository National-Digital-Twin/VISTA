apiVersion: networking.istio.io/v1alpha3
kind: VirtualService

metadata:
  name: paralog-virtual-service
spec:
  hosts:
    - paralog.demo.ndtp.co.uk
  gateways:
    - paralog/paralog-ingress-gateway
  http:
    - match:
        - uri:
            prefix: /coefficient-python/
      rewrite:
        uri: "/"
      route:
        - destination:
            host: paralog-python-api
            port:
              number: 80


