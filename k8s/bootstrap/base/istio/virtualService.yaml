apiVersion: networking.istio.io/v1alpha3
kind: VirtualService

metadata:
  name: vista-virtual-service
spec:
  hosts:
    - placeholder
  gateways:
    - placeholder
  http:
    - match:
        - uri:
            prefix: /ndtp-python/
      rewrite:
        uri: "/"
      route:
        - destination:
            host: vista-python-api
            port:
              number: 80
    - match:
        - uri:
            prefix: /vista/
      rewrite:
        uri: "/"
      route:
        - destination:
            host: smart-cache-vista-api
            port:
              number: 80
    - match:
        - uri:
            prefix: /transparent-proxy/
      rewrite:
        uri: "/"
      route:
        - destination:
            host: vista-transparent-proxy
            port:
              number: 80
    - match:
        - uri:
            prefix: /
      rewrite:
        uriRegexRewrite:
          match: ^/(/|$)(.*)
          rewrite: /\2
      route:
        - destination:
            host: vista-frontend
            port:
              number: 80
