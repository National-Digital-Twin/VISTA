resources:
  - ../../base

namespace: paralog
patches:
  - path: patches/allow-ingress.yaml
    target:
      kind: AuthorizationPolicy

  - path: patches/service-account.yaml
    target:
      kind: ServiceAccount
      name: paralog-transparent-proxy-sa

labels:
  - pairs:
      env: demo

images:
  - name: paralog-transparent-proxy-image:template
    newName: 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-transparent-proxy
    newTag: "latest"
