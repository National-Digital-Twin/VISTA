apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: vista-transparent-proxy-dr
spec:
  host: vista-transparent-proxy.vista.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
