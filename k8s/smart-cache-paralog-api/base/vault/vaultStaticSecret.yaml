apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: smart-cache-paralog-api-static-secret
spec:
  refreshAfter: 30s

  # path of the secret
  path: applications/paralog/smart-cache-paralog-api

  type: kv-v2

  mount: k8-cluster

  destination:
    # dest k8s secret
    name: smart-cache-paralog-api-static-secret
    create: true

  vaultAuthRef: smart-cache-paralog-api-static-auth
