apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    io.kompose.service: smart-cache-paralog-pro-api
  name: smart-cache-paralog-pro-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: smart-cache-paralog-pro-api
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-cache-enable: "false"
        vault.hashicorp.com/role: "smart-cache-paralog-pro-api-role"
      labels:
        io.kompose.service: smart-cache-paralog-pro-api
    spec:
      serviceAccountName: smart-cache-paralog-pro-api-sa
      containers:
        - name: smart-cache-paralog-pro-api-image
          image: smart-cache-paralog-pro-api-image
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: smart-cache-paralog-pro-api-configs
#          envFrom:
#           - secretRef:
#              name: smart-cache-paralog-pro-api-static-secret
          ports:
            - containerPort: 4001
              protocol: TCP
          resources:
            requests:
              cpu: "3"      # Minimum CPU your container is guaranteed.
              memory: "2Gi"  # Minimum Memory your container is guaranteed.
            limits:
              cpu: "4"     # Maximum CPU your container can use.
              memory: "3Gi" # Maximum Memory your container can use.
      restartPolicy: Always
