apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: paralog-frontend-static-secret
spec:
  refreshAfter: 30s

  # path of the secret
  path: applications/paralog/frontend

  type: kv-v2

  mount: k8-cluster

  destination:
    # dest k8s secret
    name: paralog-frontend-secret
    create: true

  vaultAuthRef: paralog-frontend-static-auth
