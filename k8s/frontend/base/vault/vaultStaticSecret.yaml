apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vista-frontend-static-secret
spec:
  refreshAfter: 30s

  # path of the secret
  path: applications/vista/frontend

  type: kv-v2

  mount: k8-cluster

  destination:
    # dest k8s secret
    name: vista-frontend-secret
    create: true

  vaultAuthRef: vista-frontend-static-auth
