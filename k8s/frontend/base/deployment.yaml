apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    io.kompose.service: paralog-frontend
  name: paralog-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: paralog-frontend
  template:
    metadata:
      annotations: {}
      labels:
        io.kompose.service: paralog-frontend
    spec:
      serviceAccountName: paralog-frontend-sa
      containers:
        - image: paralog-frontend-image:template
          env:
            - name: IMAGE_DIGEST
              value: "none"
          name: frontend
          resources:
            limits:
              memory: "1Gi"
            requests:
              cpu: "0.25"
              memory: "256Mi"
              ephemeral-storage: "2Gi"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
