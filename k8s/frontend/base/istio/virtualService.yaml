
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService

metadata:
  name: paralog-pro-frontend
spec:
  hosts:
    - placeholder
  gateways:
    - placeholder
  http:
    - match:
        - uri:
            prefix: /

      rewrite:
        uriRegexRewrite:
          match: ^/(/|$)(.*)
          rewrite: /\2
      route:
        - destination:
            host: paralog-pro-frontend
            port:
              number: 80
