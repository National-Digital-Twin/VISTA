apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    io.kompose.service: vista-python-api
  name: vista-python-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vista-python-api
  template:
    metadata:
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
      labels:
        io.kompose.service: vista-python-api
    spec:
      serviceAccountName: vista-python-api-sa
      containers:
        - name: vista-python-api-image
          image: vista-python-api-image:template
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: vista-python-api-configs
            - secretRef:
                name: vista-python-api-secret
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "0.5" # Minimum CPU your container is guaranteed.
              memory: "2Gi" # Minimum Memory your container is guaranteed.
              ephemeral-storage: "1Gi" # Minimum Storage your container is guaranteed
            limits:
              cpu: "3" # Maximum CPU your container can use.
              memory: "6Gi" # Maximum Memory your container can use.
              ephemeral-storage: "5Gi" # Maximum Storage your container is guaranteed
      restartPolicy: Always
