apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    io.kompose.service: smart-cache-vista-api
  name: smart-cache-vista-api
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: smart-cache-vista-api
  template:
    metadata:
      annotations: {}
      labels:
        io.kompose.service: smart-cache-vista-api
    spec:
      serviceAccountName: smart-cache-vista-api-sa
      containers:
        - name: smart-cache-vista-api-image
          image: smart-cache-vista-api-image:template
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: smart-cache-vista-api-configs
          livenessProbe:
            httpGet:
              port: 4001
              path: /
            timeoutSeconds: 3
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              port: 4001
              path: /
            timeoutSeconds: 10
            initialDelaySeconds: 10
            periodSeconds: 10
          ports:
            - containerPort: 4001
              protocol: TCP
          resources:
            requests:
              cpu: "1" # Minimum CPU your container is guaranteed.
              memory: "1Gi" # Minimum Memory your container is guaranteed.
              ephemeral-storage: "1Gi" # Minimum Storage your container is guaranteed.
            limits:
              cpu: "1" # Maximum CPU your container can use.
              memory: "2Gi" # Maximum Memory your container can use.
              ephemeral-storage: "2Gi" # Maximum Storage your container is guaranteed.
      restartPolicy: Always
