# Update all versions in this file by running:
#   $ pre-commit autoupdate
minimum_pre_commit_version: 3.8.0
default_language_version:
  python: python3.12
exclude: '.*\.md$'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        name: Check for a blank line at the end of scripts (auto-fixes)
        exclude: |
          (?x)^(
              repository-configuration/.*|
              deploy/.*|
              \.github/.*|
              frontend/public/.*| # Exclude public folder
              ^public/.*| # Exclude public folder
          )$
      - id: trailing-whitespace
        exclude: ^public/
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-added-large-files
        name: Check for files larger than 5 MB
        args: ["--maxkb=5120"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      # Run the formatter.
      - id: ruff-format
        args: [backend]
        types_or: [python, pyi, jupyter]
      # Run the linter.
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--fix, backend]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: detect-secrets - Detect secrets in staged code
        args:
          [
            "--baseline",
            ".secrets.baseline",
            "--exclude-files 'backend/poetry\\.lock'",
            "--exclude-files  'backend/\\.envrc",
            "--exclude-files '\\.secrets\\.baseline'",
            "--exclude-files '.*\\.ipynb$'",
            "--exclude-files 'frontend/dev/kafka/consumer\\.properties'",
            "--exclude-files 'frontend/dev/kafka/server\\.properties'",
            "--exclude-secrets 'password|ENTER_PASSWORD_HERE|INSERT_API_KEY_HERE'",
            "--exclude-lines 'integrity=*sha'",
          ]
        # https://pre-commit.com/#regular-expressions
        exclude: |
          (?x)^(
              poetry\.lock|
              \.secrets\.baseline|
              \.env\.template|
              .*\.ipynb |
              backend/\.envrc|
              backend/vista-python-api/src/core/\.vista_pgpass |
              frontend/dev/kafka/consumer\.properties |
              frontend/dev/kafka/server\.properties
          )$
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml]
        additional_dependencies:
          - "prettier@3.5.3"
        exclude: ^\.github/
  # - repo: local
  #   hooks:
  #     - id: trufflehog
  #       name: TruffleHog
  #       description: Detect secrets in your data.
  #       entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail --no-update'
  #       language: system
  #       stages: ["commit", "push"]

  # This would install and run trufflehog automatically without relying on user's local installation which
  # could run into the "error occurred with trufflehog updater" issue. It still accomplishes the same result.
  # The error in running it locally could be resolved with the --no-update argument.
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.90.13
    hooks:
      - id: trufflehog
        name: TruffleHog
        entry: trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail
        description: Detect secrets in your data.
        language: golang
        stages: ["commit", "push"]
