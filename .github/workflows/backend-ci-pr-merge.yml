name: Backend CI on PR merge

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      major:
        description: "Major version (default: 1)"
        required: false
        default: "1"
        type: string
      minor:
        description: "Minor version (default: 0)"
        required: false
        default: "0"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  versioning:
    name: Semantic Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
    steps:
      - name: Generate Patch Version (Timestamp)
        id: generate-patch
        run: |
          PATCH=$(date -u +"%Y%m%d%H%M%S")
          echo "patch_version=${PATCH}" >> $GITHUB_ENV

      - name: Generate Full Semantic Version
        id: generate-version
        run: |
          MAJOR="${{ github.event.inputs.major || '1' }}"
          MINOR="${{ github.event.inputs.minor || '0' }}"
          PATCH="${{ env.patch_version }}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT  # Ensure output is set correctly

      - name: Print Generated Version
        run: |
          echo "Generated Version: ${{ env.VERSION }}"

  trigger-backend-ci:
    uses: ./.github/workflows/backend-ci-pr.yml

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [versioning, trigger-backend-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set VERSION from versioning job
        run: |
          echo "VERSION=${{ needs.versioning.outputs.version }}" >> $GITHUB_ENV

      - name: Debug Version Output
        run: |
          echo "Version used for tagging: $VERSION"

      - name: Build Docker Image
        run: |
          docker build --load \
                        -t 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:${{ github.sha }} \
                        -t 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:${{ env.VERSION }} \
                        -t 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:latest \
                        -f backend/Dockerfile ./backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::503561419905:role/ecs-access-for-github
          aws-region: eu-west-2
          role-session-name: githubsession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker Image to ECR
        run: |
          docker image push --all-tags 503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api

      # - name: Build & Push Docker image
      #   uses: docker/build-push-action@v6
      #   with:
      #     file: "backend/Dockerfile"
      #     context: "./backend"
      #     load: true
      #     push: true
      #     tags: |
      #       503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:${{ env.VERSION }}
      #       503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:${{ github.sha }}
      #       503561419905.dkr.ecr.eu-west-2.amazonaws.com/paralog/demo-paralog-python-api:latest

      - name: Verify Docker Image
        run: |
          docker images
          aws ecr describe-images --repository-name paralog/demo-paralog-python-api --query 'sort_by(imageDetails, &imagePushedAt)[-1]' --output table

  tag-repository:
    name: Tag Repository
    runs-on: ubuntu-latest
    needs: [versioning, docker-build-push]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set VERSION from versioning job
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "❌ ERROR: VERSION is empty! Exiting..."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "✅ Using VERSION: $VERSION"

      - name: Debug Version Output
        run: |
          echo "Final Version: $VERSION"

      # - name: Create Git Tag
      #   run: |
      #     git config --global user.name "GitHub Actions"
      #     git config --global user.email "actions@github.com"

      #     echo "✅ Tagging commit with version: ${VERSION}"
      #     git tag -f ${VERSION}
      #     git push -f origin ${VERSION}

      #     echo "✅ Tagging commit with SHA: ${{ github.sha }}"
      #     git tag -f ${{ github.sha }}
      #     git push -f origin ${{ github.sha }}
