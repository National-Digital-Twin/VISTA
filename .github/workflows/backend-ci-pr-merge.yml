name: Backend CD on PR merge

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      major:
        description: "Major version (default: 1)"
        required: false
        default: "1"
        type: string
      minor:
        description: "Minor version (default: 0)"
        required: false
        default: "0"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  versioning:
    name: Semantic Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
    steps:
      - name: Generate Patch Version (Timestamp)
        id: generate-patch
        run: |
          PATCH=$(date -u +"%Y%m%d%H%M%S")
          echo "patch_version=${PATCH}" >> $GITHUB_ENV

      - name: Generate Full Semantic Version
        id: generate-version
        run: |
          MAJOR="${{ github.event.inputs.major || '1' }}"
          MINOR="${{ github.event.inputs.minor || '0' }}"
          PATCH="${{ env.patch_version }}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT  # Ensure output is set correctly

      - name: Print Generated Version
        run: |
          echo "Generated Version: ${{ env.VERSION }}"

  backend-ci:
    needs: [versioning]
    uses: ./.github/workflows/backend-ci-pr.yml

  push-to-ECR:
    needs: [backend-ci]
    uses: ./.github/workflows/backend-ci-push-to-ECR.yml
    with:
      aws_account_number: "503561419905"
      repo_name: "paralog/demo-paralog-python-api"

  tag-repository:
    name: Tag Repository
    runs-on: ubuntu-latest
    needs: [versioning, backend-ci, push-to-ECR]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set VERSION from versioning job
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "❌ ERROR: VERSION is empty! Exiting..."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "✅ Using VERSION: $VERSION"

      - name: Debug Version Output
        run: |
          echo "Final Version: $VERSION"

      # - name: Create Git Tag
      #   run: |
      #     git config --global user.name "GitHub Actions"
      #     git config --global user.email "actions@github.com"

      #     echo "✅ Tagging commit with version: ${VERSION}"
