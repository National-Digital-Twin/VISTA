name: Frontend CI - Build & Push to ECR

on:
  workflow_call:
    inputs:
      aws_account_number:
        required: true
        type: string
      repo_name:
        required: true
        type: string
      version:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      aws_account_number:
        description: 'AWS Account Number'
        required: true
        type: string
      repo_name:
        description: 'ECR Repository Name'
        required: true
        type: string
      version:
        description: 'Version (Optional - will be auto-generated if not provided)'
        required: false
        type: string

jobs:
  versioning:
    name: Generate Semantic Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.final_version }}

    steps:
      - name: Generate Patch Version
        id: generate-patch
        run: echo "patch_version=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Generate Full Semantic Version
        id: generate-version
        run: echo "generated_version=1.0.${{ env.patch_version }}" >> $GITHUB_ENV

      - name: Set Final Version
        id: set-version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "final_version=${{ env.generated_version }}" >> $GITHUB_ENV
          else
            echo "final_version=${{ inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Print Final Version
        run: |
          echo "Final Version: ${{ env.final_version }}"

  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: versioning
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Set VERSION Environment Variable
        run: echo "VERSION=${{ needs.versioning.outputs.version }}" >> $GITHUB_ENV

      - name: Debug Version Output
        run: |
          echo "Using version: $VERSION"

      - name: Build Docker Image
        run: |
          docker build -t ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:${{ env.VERSION }} .
          docker tag ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:${{ env.VERSION }} ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account_number }}:role/GithubActionsECR
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com

      - name: Push Docker Image
        run: |
          docker push ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:${{ env.VERSION }}
          docker push ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:latest

      - name: Verify Docker Image
        run: aws ecr describe-images --repository-name ${{ inputs.repo_name }} --region eu-west-2
