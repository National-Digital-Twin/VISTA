name: Frontend CD push to ECR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-push-to-ecr.yml"
  workflow_call:
    inputs:
      aws_account_number:
        type: string
        required: true
        description: "AWS Account Number for ECR"
      repo_name:
        type: string
        required: true
        description: "Name of the repository in ECR"
      version:
        type: string
        required: false
        description: "Optional version number to skip version generation steps"
  workflow_dispatch:
    inputs:
      aws_account_number:
        type: string
        required: true
        description: "AWS Account Number for ECR"
      repo_name:
        type: string
        required: true
        description: "Name of the repository in ECR"
      version:
        type: string
        required: false
        description: "Optional version number to skip version generation steps"

permissions:
  id-token: write
  contents: read


jobs:
  dependencies:
    name: Dependency Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Create .npmrc file
        run: |
          echo "registry=https://registry.yarnpkg.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${GITHUB_TOKEN}" >> .npmrc
          echo "@national-digital-twin:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          # ls -la node_modules || echo "node_modules directory missing!"

      - name: Run Dependency Checks
        working-directory: frontend
        run: yarn audit --groups dependencies
        continue-on-error: true

      - name: Check for Outdated Dependencies
        working-directory: frontend
        run: |
          if [ ! -f yarn.lock ]; then
            echo "Error: yarn.lock file is missing!"
            exit 1
          fi
          echo "Checking for outdated dependencies"
          yarn outdated
        continue-on-error: true

    #   - name: Verify Lockfile Integrity
    #     working-directory: frontend
    #     run: yarn check --integrity
    #     continue-on-error: true
    #   - name: Build Frontend
    #     working-directory: frontend
    #     run: yarn run build
    #     env:
    #       VITE_ONTOLOGY_SERVICE_URL: "/ontology"
    #       VITE_PARALOG_API_URL: "/paralog"
    #       VITE_MAP_TILER_TOKEN: "ABC123"
    #       VITE_MET_OFFICE_GLOBAL_SPOT_API_KEY: "XYZ123"

      - name: List Build Output
        working-directory: frontend
        run: ls -l dist/

  docker-build-push:
    name: Docker Build & Push
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build --load \
                        -t ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:${{ github.sha }} \
                        -t ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}:latest \
                        -f frontend/Dockerfile ./frontend

      - name: List Built Docker Images
        run: docker images

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account_number }}:role/ecs-access-for-github
          aws-region: eu-west-2
          role-session-name: githubsession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker Image to ECR
        run: |
          docker image push --all-tags ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }}

      - name: Verify Docker Image in ECR
        run: |
          aws ecr describe-images --repository-name ${{ inputs.repo_name }} --query 'sort_by(imageDetails, &imagePushedAt)[-1]' --output table >> $GITHUB_STEP_SUMMARY

      - name: Cleanup Docker Images
        if: always()
        run: docker rmi -f $(docker images -q ${{ inputs.aws_account_number }}.dkr.ecr.eu-west-2.amazonaws.com/${{ inputs.repo_name }})
