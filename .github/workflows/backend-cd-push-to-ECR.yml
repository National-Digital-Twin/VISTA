name: Backend CD - push to ECR

on:
  workflow_call:
    inputs:
      aws_account_number:
        type: string
        required: true
        description: "AWS Account Number for ECR"
      repo_name:
        type: string
        required: true
        description: "Name of the repository in ECR"
      app_name:
        type: string
        required: true
        description: "Name of app - frontend, backend or transparent-proxy"
      version:
        type: string
        required: true
        description: "Version number passed from main workflow"
  workflow_dispatch:
    inputs:
      aws_account_number:
        type: string
        required: true
        description: "AWS Account Number for ECR"
      repo_name:
        type: string
        required: true
        description: "Name of the repository in ECR"
      app_name:
        type: string
        required: true
        description: "Name of app - frontend, backend or transparent-proxy"
      version:
        type: string
        required: true
        description: "Version number passed from main workflow"

permissions:
  id-token: write
  contents: read

jobs:
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AWS_ACCOUNT_NUMBER: ${{ inputs.aws_account_number }}
      REPO_NAME: ${{ inputs.repo_name }}
      APP_NAME: ${{ inputs.app_name }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Debug Version Output
        run: |
          echo "Using provided version: $VERSION"

      - name: Build Docker Image
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_NUMBER}.dkr.ecr.eu-west-2.amazonaws.com"
          docker build --load \
                        -t "${ECR_REGISTRY}/${REPO_NAME}:${GITHUB_SHA}" \
                        -t "${ECR_REGISTRY}/${REPO_NAME}:${VERSION}" \
                        -f "${APP_NAME}/Dockerfile" "./${APP_NAME}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account_number }}:role/ecr-access-for-github
          aws-region: eu-west-2
          role-session-name: githubsession

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0

      - name: Push Docker Image to ECR
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_NUMBER}.dkr.ecr.eu-west-2.amazonaws.com"
          docker image push --all-tags "${ECR_REGISTRY}/${REPO_NAME}"

      - name: Verify Docker Image
        run: |
          docker images
          aws ecr describe-images --repository-name "${REPO_NAME}" --query 'sort_by(imageDetails, &imagePushedAt)[-1]' --output table >> "$GITHUB_STEP_SUMMARY"
