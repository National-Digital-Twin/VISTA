name: Paralog continuous deployment dev

on:
  push:
    branches:
      - dev-deployment-test
  workflow_dispatch:

concurrency:
  group: dev_environment
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/cd-template.yml
    with:
      environment: "dev"
    secrets:
      MAP_TILER_TOKEN: ${{ secrets.VITE_MAP_TILER_TOKEN }}
      ORDNANCE_SURVEY_API_KEY: ${{ secrets.ORDNANCE_SURVEY_API_KEY }}
      ADMIRALTY_API_KEY: ${{ secrets.ADMIRALTY_API_KEY }}
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SERVICE_AWS_ACCESS_KEY_ID: ${{ secrets.SERVICE_AWS_ACCESS_KEY_ID }}
      SERVICE_AWS_SECRET_ACCESS_KEY: ${{ secrets.SERVICE_AWS_SECRET_ACCESS_KEY }}
      AUTHORIZATION_TOKEN: ${{ secrets.AUTHORIZATION_TOKEN }}
      REALTIME_TRAINS_API_KEY: ${{ secrets.REALTIME_TRAINS_API_KEY }}
      MET_OFFICE_GLOBAL_SPOT_API_KEY: ${{ secrets.MET_OFFICE_GLOBAL_SPOT_API_KEY }}
