name: Backend CI

on:
  workflow_call:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/constraints.txt"
  push:
    branches:
      - develop
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  dependencies:
    name: Dependency Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12.5"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Virtual Environment
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('backend/poetry.lock', '.github/workflows/constraints.txt') }}
          restore-keys: |
            venv-${{ matrix.python-version }}-

      - name: Create virtualenv (if not cached)
        if: steps.venv-cache.outcome!= 'restored'
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --constraint=.github/workflows/constraints.txt --upgrade pip

      - name: Install Poetry
        if: steps.venv-cache.outcome!= 'restored'
        run: |
          source venv/bin/activate
          pip install poetry --constraint=.github/workflows/constraints.txt

      - name: Configure Poetry
        if: steps.venv-cache.outcome!= 'restored'
        run: |
          source venv/bin/activate
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create false
          poetry config virtualenvs.path venv

      - name: Install Python Dependencies
        if: steps.venv-cache.outcome!= 'restored'
        run: |
          source venv/bin/activate
          cd backend
          poetry install --no-root

      - name: Install Testing Dependencies
        if: steps.venv-cache.outcome!= 'restored'
        run: |
          source venv/bin/activate
          pip install pytest==8.3.3 pytest-cov==5.0.0

      # - name: PIP AUDIT
      #   run: |
      #     source venv/bin/activate
      #     pip-audit

      # - name: POETRY LOCK CHECK
      #   run: |
      #     source venv/bin/activate
      #     cd backend
      #     poetry check --lock
      #     poetry lock --no-update

      # - name: Check for Outdated Dependencies
      #   run: |
      #     source venv/bin/activate
      #     cd backend
      #     poetry show --outdated

      - name: PYTEST
        env:
          DJANGO_SECRET_KEY: fake-secret-key #pragma: allowlist secret
        run: |
          source venv/bin/activate
          cd backend
          pytest --cov-fail-under=80.0
        continue-on-error: true

  linting:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore virtualenv from cache
        id: restore-venv
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('backend/poetry.lock', '.github/workflows/constraints.txt') }} #Consistent key
          restore-keys: |
            venv-${{ matrix.python-version }}-

      - name: Create virtualenv if missing
        if: steps.restore-venv.outcome!= 'restored'
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --constraint=.github/workflows/constraints.txt --upgrade pip

      - name: Install linting tools
        if: steps.restore-venv.outcome!= 'restored'
        run: |
          source venv/bin/activate
          pip install -q ruff isort bandit

      - name: Run RUFF
        run: |
          source venv/bin/activate
          ruff format backend

      - name: Run ISORT (import sorting)
        run: |
          source venv/bin/activate
          isort --check-only backend
        continue-on-error: true

      - name: Run BANDIT (security linter)
        run: |
          source venv/bin/activate
          bandit -r -q backend -lll

  testing:
    name: Testing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: dependencies
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore virtualenv from cache
        id: restore-venv
        uses: actions/cache@v4
        with:
          path: venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('backend/poetry.lock', '.github/workflows/constraints.txt') }} #Consistent key
          restore-keys: |
            venv-${{ matrix.python-version }}-

      - name: Activate Virtual Environment
        run: source venv/bin/activate

      - name: pytest
        env:
          DJANGO_SECRET_KEY: fake-secret-key #pragma: allowlist secret
        run: |
          source venv/bin/activate
          cd backend; pytest --cov-fail-under=80.0
        continue-on-error: true

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: linting
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.18.3/trivy_0.18.3_Linux-64bit.deb # Update Trivy Version if needed
          sudo dpkg -i trivy_0.18.3_Linux-64bit.deb

      - name: Run Trivy Scan
        run: |
          trivy -q fs --severity HIGH,CRITICAL backend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependencies, linting, security-scanning, testing]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          file: "backend/Dockerfile"
          context: "./backend"
          load: true
          tags: "paralog/demo-paralog-python-api:latest"

  docker-test:
    name: Docker Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker image
        run: |
          docker images
          docker run --rm -d -p 8000:8000 --name backend paralog/demo-paralog-python-api:latest
          docker ps
          sleep 10
          docker logs backend

      - name: Ping App
        run: |
          #!/bin/bash
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ping/)
          if [[ "$status_code" == "200" ]]; then
            echo "Ping successful (200 OK)"
          else
            echo "Ping failed with status code: $status_code"
            exit 1  # Indicate an error
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop backend
