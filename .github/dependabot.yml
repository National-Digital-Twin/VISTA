version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      actions-updates:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      js-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend/qa"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      js-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/frontend/dev"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/transparent-proxy"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-major"]
