query getRoadRoute(
  $startLat: Float!
  $startLon: Float!
  $endLat: Float!
  $endLon: Float!
  $floodExtent: GeoJSON
  $vehicle: Vehicle
) {
  roadRoute(
    routeInput: {
      startLat: $startLat
      startLon: $startLon
      endLat: $endLat
      endLon: $endLon
      floodExtent: $floodExtent
      vehicle: $vehicle
    }
  ) {
    routeGeojson
  }
}
