services:
  fuseki-server:
    container_name: paralog-fuseki-server
    environment:
      JAVA_OPTIONS: "-XX:MaxRAMPercentage=40.0"
    command:
      - --ping
      - --config
      - /fuseki/config.ttl
    image: atomgraph/fuseki:latest
    volumes:
      - ${PWD}/config/config.ttl:/fuseki/config.ttl:ro
      - ${PWD}/data:/fuseki/databases:ro
    network_mode: host

  api:
    container_name: smart-cache-paralog-api
    image: smart-cache-paralog-api:template
    ports:
      - 4001:4001
    environment:
      JENA_URL: localhost
      JENA_PORT: 3030
      PORT: 4001
      JENA_DATASET: knowledge
    network_mode: host

  transparent-proxy:
    container_name: paralog-transparent-proxy
    image: paralog-transparent-proxy:template
    ports:
      - 5013:80
    env_file:
      - "../.env"

  paralog-python-api:
    container_name: paralog-python-api
    image: paralog-python-api:template
    ports:
      - 8000:8000
    env_file:
      - "../.env"
