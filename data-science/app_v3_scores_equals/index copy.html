<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISTA Network Resilience Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS and JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100%; width: 100%; }
        .loader { border: 8px solid #f3f3f3; border-radius: 50%; border-top: 8px solid #3498db; width: 60px; height: 60px; animation: spin 2s linear infinite; position: absolute; top: 50%; left: 50%; margin-top: -30px; margin-left: -30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Toggle Switch Style */
        .switch { position: relative; display: inline-block; width: 40px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(16px); }
        /* Ensure Leaflet attribution is visible */
        .leaflet-control-attribution { font-size: 10px !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 p-4 h-screen">
        <!-- Left Panel: Controls & Info -->
        <aside class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md flex flex-col h-full">
            <!-- Non-scrolling content -->
            <div class="flex-shrink-0 space-y-6">
                <header class="text-center">
                    <h1 class="text-2xl font-bold text-gray-700">VISTA Asset Network Resilience Analysis</h1>
                </header>

                <!-- Filters Section -->
                <div id="filters-section" class="hidden">
                     <h2 class="text-xl font-semibold mb-3 border-b pb-2">Filter & View</h2>
                     <div class="space-y-4">
                         <div>
                            <label for="criticality-filter" class="block text-sm font-medium">Criticality Score</label>
                            <input type="range" id="criticality-filter" min="0" max="3" step="1" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                            <span class="text-sm text-gray-500">Show >= <span id="criticality-value">0</span></span>
                         </div>
                         <div class="flex items-center justify-between">
                             <label for="unconnected-toggle" class="text-sm font-medium">Hide Unconnected Assets</label>
                             <label class="switch">
                                <input type="checkbox" id="unconnected-toggle">
                                <span class="slider"></span>
                             </label>
                         </div>
                         <div class="flex items-center justify-between">
                             <label for="propagation-toggle" class="text-sm font-medium">Deep Failure Propagation</label>
                             <label class="switch">
                                <input type="checkbox" id="propagation-toggle">
                                <span class="slider"></span>
                             </label>
                         </div>
                         <div id="hazard-layers-container" class="pt-4">
                            <h3 class="text-lg font-semibold mb-2 border-b pb-1">Hazard Layers</h3>
                            <!-- Toggles will be dynamically inserted here -->
                         </div>
                     </div>
                </div>
            </div>
            
            <!-- Info Panel (scrollable) -->
            <div id="info-panel" class="hidden space-y-4 flex-grow overflow-y-auto pt-6">
                <div id="node-info" class="bg-gray-50 p-4 rounded-lg hidden">
                    <h3 class="font-semibold text-lg mb-2">Asset Details: <span id="node-id" class="font-mono text-blue-600"></span></h3>
                    <div id="node-attributes" class="text-sm space-y-1 max-h-48 overflow-y-auto"></div>
                    <div class="flex space-x-2 mt-4">
                        <button id="simulate-failure-btn" class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition duration-300">Simulate Failure</button>
                        <button id="reset-btn" class="w-full bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 transition duration-300 hidden">Reset</button>
                    </div>
                </div>
                <div id="failure-results" class="bg-red-50 p-4 rounded-lg hidden">
                    <h3 class="font-semibold text-lg mb-2 text-red-800">Failure Simulation Results</h3>
                    <p><strong>Total Failed:</strong> <span id="total-failed" class="font-mono text-red-600"></span></p>
                    <div class="mt-2">
                        <h4 class="font-medium">Failed Assets:</h4>
                        <ul id="failed-nodes-list" class="text-xs h-32 overflow-y-auto bg-white rounded p-2 mt-1"></ul>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Panel: Map Visualization -->
        <main class="lg:col-span-3 bg-white rounded-lg shadow-md relative" id="map-container">
            <div id="loader" class="loader hidden"></div>
            <div id="map"></div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loader = document.getElementById('loader');
            const mapContainer = document.getElementById('map');
            const filtersSection = document.getElementById('filters-section');
            const infoPanel = document.getElementById('info-panel');
            const hazardLayersContainer = document.getElementById('hazard-layers-container');
            
            let graphData = null;
            let selectedNodeId = null;
            let map = null;
            
            const nodeMarkers = {};
            const linkLines = {};
            const nodeToDataMap = new Map();
            const hazardMapLayers = {}; // To store L.geoJSON objects

            function initializeMap() {
                if (map) map.remove();
                map = L.map('map').setView([50.6, -1.3], 9); // Centered on Isle of Wight
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
            }
            initializeMap();

            const criticalityColors = { 0: '#28a745', 1: '#ffc107', 2: '#fd7e14', 3: '#dc3545' };
            const FAILED_COLOR = '#8B0000';
            const hazardLayerStyles = {
                flood: { color: "#3388ff", weight: 2, opacity: 0.7, fillOpacity: 0.3 },
                heatstress: { color: "#ff6600", weight: 2, opacity: 0.7, fillOpacity: 0.3 },
                landslide: { color: "#996633", weight: 2, opacity: 0.7, fillOpacity: 0.3 }
            };

            function getNodeStyle(nodeData, isSelected = false, isFailed = false) {
                const color = isFailed ? FAILED_COLOR : criticalityColors[nodeData.criticality_score] || '#777777';
                return {
                    radius: isSelected ? 10 : 6,
                    fillColor: color,
                    color: isSelected ? "#000" : "#fff",
                    weight: isSelected ? 3 : 1,
                    opacity: 1,
                    fillOpacity: 0.8
                };
            }
            
            function renderMap(data) {
                graphData = data;
                nodeToDataMap.clear();
                
                Object.values(nodeMarkers).forEach(marker => marker.remove());
                Object.values(linkLines).forEach(line => line.remove());
                for (const key in nodeMarkers) delete nodeMarkers[key];
                for (const key in linkLines) delete linkLines[key];
                
                if (!graphData.nodes || graphData.nodes.length === 0) return;

                const validNodes = graphData.nodes.filter(n => n.lat != null && n.long != null);
                if (validNodes.length === 0) {
                    alert("Error: No assets have valid latitude/longitude coordinates.");
                    return;
                }

                validNodes.forEach(node => nodeToDataMap.set(node.id, node));

                validNodes.forEach(node => {
                    const marker = L.circleMarker([node.lat, node.long], getNodeStyle(node))
                        .addTo(map)
                        .on('click', () => nodeClicked(node.id));
                    marker.bindTooltip(node.id);
                    nodeMarkers[node.id] = marker;
                });

                graphData.links.forEach((link, index) => {
                    const sourceNode = nodeToDataMap.get(link.source);
                    const targetNode = nodeToDataMap.get(link.target);
                    if (sourceNode && targetNode) {
                        const latlngs = [[sourceNode.lat, sourceNode.long], [targetNode.lat, targetNode.long]];
                        const line = L.polyline(latlngs, { color: '#666', weight: 2, opacity: 0.7 }).addTo(map);
                        linkLines[index] = line;
                    }
                });
                
                if (Object.keys(nodeMarkers).length > 0) {
                    const group = new L.featureGroup(Object.values(nodeMarkers));
                    map.fitBounds(group.getBounds().pad(0.2));
                }
            }

            async function analyzeNetwork() {
                loader.classList.remove('hidden');
                mapContainer.style.opacity = '0.5';

                const selectedLayers = { flood: [], heatstress: [], landslide: [] };
                document.querySelectorAll('#hazard-layers-container input[type="checkbox"]:checked').forEach(checkbox => {
                    const { type, filename } = checkbox.dataset;
                    if (selectedLayers[type]) {
                        selectedLayers[type].push(filename);
                    }
                });
                
                try {
                    const response = await fetch('/load-network', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(selectedLayers)
                    });
                    if (!response.ok) throw new Error((await response.json()).error || 'Failed to load network data.');
                    const data = await response.json();
                    
                    renderMap(data.graph);
                    filtersSection.classList.remove('hidden');
                    infoPanel.classList.remove('hidden');
                    resetSimulation();
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    loader.classList.add('hidden');
                    mapContainer.style.opacity = '1';
                }
            }

            async function toggleHazardLayer(event) {
                const checkbox = event.target;
                const { type, filename } = checkbox.dataset;
                const layerId = `${type}-${filename}`;

                if (checkbox.checked) {
                    try {
                        const response = await fetch(`/get-geojson-layer/${type}/${filename}`);
                        const geoJsonData = await response.json();
                        const layer = L.geoJSON(geoJsonData, { style: hazardLayerStyles[type] });
                        layer.addTo(map);
                        hazardMapLayers[layerId] = layer;
                    } catch (error) {
                        console.error(`Failed to load layer ${filename}:`, error);
                        alert(`Could not load hazard layer: ${filename}`);
                    }
                } else {
                    if (hazardMapLayers[layerId]) {
                        map.removeLayer(hazardMapLayers[layerId]);
                        delete hazardMapLayers[layerId];
                    }
                }
                // Recalculate scores whenever a layer is toggled
                await analyzeNetwork();
            }

            async function populateHazardLayers() {
                try {
                    const response = await fetch('/get-hazard-layers');
                    const layers = await response.json();
                    
                    hazardLayersContainer.innerHTML = '<h3 class="text-lg font-semibold mb-2 border-b pb-1">Hazard Layers</h3>';

                    const createToggles = (fileList, type, title) => {
                        if (fileList.length > 0) {
                            const groupDiv = document.createElement('div');
                            groupDiv.className = 'mb-3';
                            const titleEl = document.createElement('h4');
                            titleEl.className = 'font-semibold text-sm mb-1';
                            titleEl.textContent = title;
                            groupDiv.appendChild(titleEl);

                            fileList.forEach(filename => {
                                const div = document.createElement('div');
                                div.className = 'flex items-center justify-between mt-1';
                                const label = document.createElement('label');
                                label.htmlFor = `${type}-${filename}`;
                                label.className = 'text-sm font-medium';
                                label.textContent = filename.replace('.geojson', '');
                                
                                const switchLabel = document.createElement('label');
                                switchLabel.className = 'switch';
                                const input = document.createElement('input');
                                input.type = 'checkbox';
                                input.id = `${type}-${filename}`;
                                input.dataset.type = type;
                                input.dataset.filename = filename;
                                input.checked = true; // Default to on
                                input.addEventListener('change', toggleHazardLayer);
                                
                                const span = document.createElement('span');
                                span.className = 'slider';
                                
                                switchLabel.appendChild(input);
                                switchLabel.appendChild(span);
                                div.appendChild(label);
                                div.appendChild(switchLabel);
                                groupDiv.appendChild(div);
                            });
                            hazardLayersContainer.appendChild(groupDiv);
                        }
                    };

                    createToggles(layers.flood, 'flood', 'Flood Layers');
                    createToggles(layers.heatstress, 'heatstress', 'Heat Stress Layers');
                    createToggles(layers.landslide, 'landslide', 'Landslide Layers');

                } catch (error) {
                    console.error("Could not fetch hazard layers:", error);
                }
            }
            
            async function initializeApp() {
                await populateHazardLayers();
                // Trigger initial analysis and layer display
                document.querySelectorAll('#hazard-layers-container input[type="checkbox"]').forEach(cb => {
                    if (cb.checked) {
                        toggleHazardLayer({ target: cb }); // Simulate a check event to load layers
                    }
                });
                // The final toggleHazardLayer call will trigger analyzeNetwork
            }

            initializeApp();
            
            function deselectNode() {
                if (selectedNodeId && nodeMarkers[selectedNodeId]) {
                    const nodeData = nodeToDataMap.get(selectedNodeId);
                    if (nodeData) {
                       const isFailed = nodeData.status === 'failed';
                       nodeMarkers[selectedNodeId].setStyle(getNodeStyle(nodeData, false, isFailed));
                    }
                }
                selectedNodeId = null;
                document.getElementById('node-info').classList.add('hidden');
            }

            async function nodeClicked(nodeId) {
                if (selectedNodeId === nodeId) {
                    deselectNode();
                    return;
                }
                deselectNode();
                selectedNodeId = nodeId;
                const localNodeData = nodeToDataMap.get(nodeId);
                if (nodeMarkers[nodeId] && localNodeData) {
                    const isFailed = localNodeData.status === 'failed';
                    nodeMarkers[nodeId].setStyle(getNodeStyle(localNodeData, true, isFailed));
                    nodeMarkers[nodeId].bringToFront();
                }
                const response = await fetch(`/node_info/${nodeId}`);
                const info = await response.json();
                if (localNodeData && info.attributes) {
                    info.attributes.status = localNodeData.status;
                }
                const nodeInfoDiv = document.getElementById('node-info');
                document.getElementById('node-id').textContent = nodeId;
                const attributesDiv = document.getElementById('node-attributes');
                attributesDiv.innerHTML = '';
                for (const [key, value] of Object.entries(info.attributes)) {
                    const p = document.createElement('p');
                    const displayKey = (key === 'asset_resilience_score') ? 'asset score' : key;
                    p.innerHTML = `<strong>${displayKey}:</strong> <span class="font-mono">${value !== null ? value : 'N/A'}</span>`;
                    attributesDiv.appendChild(p);
                }
                nodeInfoDiv.classList.remove('hidden');
            }

            document.getElementById('simulate-failure-btn').addEventListener('click', async function() {
                if (!selectedNodeId) return;
                const propagateDeep = document.getElementById('propagation-toggle').checked;
                try {
                    const response = await fetch(`/simulate/${selectedNodeId}`, { 
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ propagateDeep: propagateDeep })
                    });
                    if (!response.ok) throw new Error((await response.json()).error || 'Simulation failed.');
                    const results = await response.json();
                    document.getElementById('total-failed').textContent = results.total_failed;
                    const failedList = document.getElementById('failed-nodes-list');
                    failedList.innerHTML = '';
                    results.failed_nodes.forEach(nodeId => {
                        const li = document.createElement('li');
                        li.textContent = nodeId;
                        failedList.appendChild(li);
                        const nodeData = nodeToDataMap.get(nodeId);
                        if (nodeData) nodeData.status = 'failed';
                    });
                    document.getElementById('failure-results').classList.remove('hidden');
                    document.getElementById('reset-btn').classList.remove('hidden');
                    Object.keys(nodeMarkers).forEach(nodeId => {
                        const isFailed = results.failed_nodes.includes(nodeId);
                        const nodeData = nodeToDataMap.get(nodeId);
                        const isSelected = (nodeId === selectedNodeId);
                        if (nodeData) {
                           nodeMarkers[nodeId].setStyle(getNodeStyle(nodeData, isSelected, isFailed));
                        }
                    });
                    if (selectedNodeId) await nodeClicked(selectedNodeId);
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            });
            
            function resetSimulation() {
                if (!graphData) return;
                nodeToDataMap.forEach(nodeData => nodeData.status = 'running');
                Object.values(nodeMarkers).forEach(marker => {
                    const nodeId = marker.getTooltip().getContent();
                    const nodeData = nodeToDataMap.get(nodeId);
                    if (nodeData) marker.setStyle(getNodeStyle(nodeData, false, false));
                });
                document.getElementById('failure-results').classList.add('hidden');
                document.getElementById('reset-btn').classList.add('hidden');
                deselectNode();
            }

            document.getElementById('reset-btn').addEventListener('click', resetSimulation);

            const criticalityFilter = document.getElementById('criticality-filter');
            const unconnectedToggle = document.getElementById('unconnected-toggle');

            function applyFilters() {
                if (!graphData) return;
                const critValue = +criticalityFilter.value;
                const hideUnconnected = unconnectedToggle.checked;
                document.getElementById('criticality-value').textContent = critValue;
                const connectedNodes = new Set();
                if (hideUnconnected) {
                    graphData.links.forEach(link => {
                        connectedNodes.add(link.source);
                        connectedNodes.add(link.target);
                    });
                }
                graphData.nodes.forEach(node => {
                    const marker = nodeMarkers[node.id];
                    if (!marker) return;
                    const criticalityMatch = node.criticality_score >= critValue;
                    const connectivityMatch = !hideUnconnected || connectedNodes.has(node.id);
                    if (criticalityMatch && connectivityMatch) {
                        if (!map.hasLayer(marker)) map.addLayer(marker);
                    } else {
                        if (map.hasLayer(marker)) map.removeLayer(marker);
                    }
                });
                Object.values(linkLines).forEach(line => {
                    if (map.hasLayer(line)) map.removeLayer(line);
                });
                graphData.links.forEach((link, index) => {
                    const sourceNode = nodeToDataMap.get(link.source);
                    const targetNode = nodeToDataMap.get(link.target);
                    if (sourceNode && targetNode) {
                        const sourceVisible = map.hasLayer(nodeMarkers[sourceNode.id]);
                        const targetVisible = map.hasLayer(nodeMarkers[targetNode.id]);
                        if(sourceVisible && targetVisible) {
                            map.addLayer(linkLines[index]);
                        }
                    }
                });
            }

            criticalityFilter.addEventListener('input', applyFilters);
            unconnectedToggle.addEventListener('change', applyFilters);
        });
    </script>
</body>
</html>
